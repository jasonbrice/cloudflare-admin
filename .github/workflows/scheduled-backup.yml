name: Scheduled DNS zone backup

on:
  schedule:
    # Weekly on Sundays at 07:00 UTC (~02:00 US Central, ~03:00 US Eastern).
    # Adjust to taste; cron times are always UTC on GitHub Actions.
    - cron: '0 7 * * 0'
  workflow_dispatch:  # manual "Run workflow" button

permissions:
  contents: read

env:
  NODE_VERSION: '24'

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: production   # reuses the same env that holds production secrets
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run backup
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_CONTAINER: ${{ vars.AZURE_STORAGE_CONTAINER || 'cloudflare-zone-backups' }}
        run: node src/index.js --backup
