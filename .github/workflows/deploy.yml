name: Build and deploy to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:  # lets you trigger manually from the Actions tab

permissions:
  id-token: write   # required for OIDC login
  contents: read

env:
  AZURE_WEBAPP_NAME: cloudflare-dashboard   # ← change this
  NODE_VERSION: '24'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production   # ties to the GitHub environment holding the vars
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      # - name: Run tests
      #   run: npm test      # uncomment when you add real tests

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .