<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloudflare Domain Plan Analyzer</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest" crossorigin="use-credentials">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #1a1a1a; }

  header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 20px; font-weight: 600; }
  .header-stats { display: flex; gap: 24px; font-size: 14px; color: #555; }
  .header-stats span { display: flex; align-items: center; gap: 6px; }

  .toolbar { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 10px 24px; display: flex; align-items: center; gap: 16px; }
  .toolbar input[type="text"] { padding: 6px 12px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 14px; width: 240px; }
  .toolbar select { padding: 6px 10px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 14px; }
  .toolbar button { padding: 6px 14px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 14px; background: #fff; cursor: pointer; }
  .toolbar button:hover { background: #f5f5f5; }
  .toolbar button.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
  .toolbar button.primary:hover { background: #1d4ed8; }

  #loading { text-align: center; padding: 80px 24px; }
  #loading .bar-container { width: 400px; max-width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; margin: 16px auto; overflow: hidden; }
  #loading .bar { height: 100%; background: #2563eb; border-radius: 4px; transition: width 0.2s; width: 0%; }
  #loading .status { font-size: 14px; color: #666; margin-top: 8px; }

  .columns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 24px; min-height: 400px; }
  .plan-column { background: #fff; border-radius: 10px; border: 2px solid transparent; padding: 0; display: flex; flex-direction: column; min-height: 300px; transition: border-color 0.15s; }
  .plan-column.drag-over { border-color: #2563eb; background: #f0f7ff; }
  .plan-column-header { padding: 14px 16px; border-radius: 8px 8px 0 0; font-weight: 600; font-size: 15px; display: flex; justify-content: space-between; align-items: center; }
  .plan-column-header .count { font-weight: 400; font-size: 13px; opacity: 0.8; }
  .plan-column[data-plan="free"] .plan-column-header { background: #f3f4f6; color: #374151; }
  .plan-column[data-plan="pro"] .plan-column-header { background: #dbeafe; color: #1e40af; }
  .plan-column[data-plan="business"] .plan-column-header { background: #ffedd5; color: #9a3412; }
  .plan-column[data-plan="enterprise"] .plan-column-header { background: #ede9fe; color: #5b21b6; }
  .plan-column-body { padding: 8px; flex: 1; overflow-y: auto; max-height: 70vh; }

  .domain-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; cursor: grab; transition: box-shadow 0.15s, opacity 0.15s; user-select: none; }
  .domain-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .domain-card.dragging { opacity: 0.4; }
  .domain-card .domain-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .domain-card .domain-stats { font-size: 12px; color: #666; display: flex; gap: 12px; }
  .domain-card .domain-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
  .badge-ok { background: #dcfce7; color: #166534; }
  .badge-downgrade { background: #fef9c3; color: #854d0e; }
  .badge-upgrade { background: #fee2e2; color: #991b1b; }
  .badge-error { background: #f3f4f6; color: #6b7280; }
  .badge-moved { background: #dbeafe; color: #1e40af; }
  .domain-card .recommend { font-size: 11px; color: #888; margin-top: 3px; }
  .domain-card .score-chip { display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 3px; margin-left: 4px; vertical-align: middle; letter-spacing: 0.02em; }
  .score-chip.critical { background: #fecaca; color: #7f1d1d; }
  .score-chip.strong { background: #fee2e2; color: #991b1b; }
  .score-chip.moderate { background: #fef3c7; color: #92400e; }
  .score-chip.weak { background: #f3f4f6; color: #6b7280; }
  .score-chip.downgrade-critical { background: #86efac; color: #14532d; }
  .score-chip.downgrade-strong { background: #dcfce7; color: #166534; }
  .score-chip.downgrade-moderate { background: #d1fae5; color: #065f46; }
  /* Security/optimization chip — distinct palette (purple/orange) so it doesn't
     get mistaken for the plan-recommendation chip on the same card. */
  .domain-card .sec-chip { display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 3px; margin-left: 4px; vertical-align: middle; letter-spacing: 0.02em; }
  .sec-chip.critical { background: #c4b5fd; color: #4c1d95; }
  .sec-chip.strong { background: #ddd6fe; color: #5b21b6; }
  .sec-chip.moderate { background: #ede9fe; color: #6d28d9; }
  .sec-chip.weak { background: #f3f4f6; color: #6b7280; }

  #pending { background: #fff; border-top: 1px solid #e0e0e0; padding: 16px 24px; display: none; }
  #pending.has-changes { display: block; }
  #pending h3 { font-size: 15px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
  #pending .change-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .change-item { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; background: #f0f7ff; border: 1px solid #bfdbfe; border-radius: 6px; padding: 4px 10px; }
  .change-item .arrow { color: #2563eb; }
  .change-item button { background: none; border: none; cursor: pointer; color: #999; font-size: 16px; padding: 0 2px; }
  .change-item button:hover { color: #e11d48; }

  .hidden { display: none !important; }

  /* Split button (Backup main + dropdown chevron) */
  .split-button { display: inline-flex; align-items: stretch; position: relative; }
  .split-button > button { border: 1px solid #d0d0d0; background: #fff; cursor: pointer; font-size: 14px; padding: 6px 12px; }
  .split-button > button:hover { background: #f5f5f5; }
  .split-button > button.split-main { border-right: none; border-radius: 6px 0 0 6px; }
  .split-button > button.split-toggle { border-radius: 0 6px 6px 0; padding: 6px 8px; font-size: 11px; color: #666; }
  .split-button > button.split-toggle:focus { outline: 2px solid #2563eb; outline-offset: -2px; }
  .split-menu { position: absolute; top: calc(100% + 4px); right: 0; min-width: 180px; background: #fff; border: 1px solid #d0d0d0; border-radius: 6px; box-shadow: 0 4px 14px rgba(0,0,0,0.12); z-index: 50; overflow: hidden; }
  .split-menu.hidden { display: none; }
  .split-menu button { display: block; width: 100%; text-align: left; background: #fff; border: none; padding: 8px 14px; font-size: 13px; cursor: pointer; }
  .split-menu button:hover { background: #f3f4f6; }
  .split-menu button:disabled { color: #aaa; cursor: not-allowed; background: #fff; }

  /* Detail Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .modal { background: #fff; border-radius: 12px; width: 680px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  .modal-header { padding: 20px 24px 12px; display: flex; justify-content: space-between; align-items: flex-start; }
  .modal-header h2 { font-size: 20px; font-weight: 700; margin: 0; }
  .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; padding: 0 4px; line-height: 1; }
  .modal-close:hover { color: #333; }
  .modal-body { padding: 0 24px 24px; }

  .detail-plan-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; font-size: 14px; }
  .detail-plan-badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-weight: 600; font-size: 13px; }
  .detail-plan-badge.free { background: #f3f4f6; color: #374151; }
  .detail-plan-badge.pro { background: #dbeafe; color: #1e40af; }
  .detail-plan-badge.business { background: #ffedd5; color: #9a3412; }
  .detail-plan-badge.enterprise { background: #ede9fe; color: #5b21b6; }
  .detail-arrow { font-size: 18px; color: #2563eb; }
  .detail-status { font-weight: 600; font-size: 13px; }
  .detail-status.ok { color: #166534; }
  .detail-status.downgrade { color: #854d0e; }
  .detail-status.upgrade { color: #991b1b; }

  .detail-section { margin-bottom: 18px; }
  .detail-section h3 { font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 8px; border-bottom: 1px solid #e5e7eb; padding-bottom: 4px; }
  .detail-section ul { list-style: none; padding: 0; }
  .detail-section li { font-size: 13px; color: #555; padding: 3px 0; padding-left: 18px; position: relative; }
  .detail-section li::before { content: "•"; position: absolute; left: 4px; color: #999; }

  .headroom-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; }
  .headroom-label { width: 90px; font-weight: 500; color: #555; flex-shrink: 0; }
  .headroom-bar-track { flex: 1; height: 14px; background: #f3f4f6; border-radius: 7px; position: relative; overflow: hidden; }
  .headroom-bar-fill { height: 100%; border-radius: 7px; transition: width 0.3s; }
  .headroom-bar-fill.green { background: #86efac; }
  .headroom-bar-fill.yellow { background: #fde68a; }
  .headroom-bar-fill.red { background: #fca5a5; }
  .headroom-pct { width: 50px; text-align: right; font-weight: 600; flex-shrink: 0; }
  .headroom-pct.green { color: #166534; }
  .headroom-pct.yellow { color: #854d0e; }
  .headroom-pct.red { color: #991b1b; }
  .headroom-value { font-size: 12px; color: #888; width: 140px; flex-shrink: 0; }

  .strength-row { display: flex; align-items: center; gap: 10px; font-size: 13px; margin-bottom: 16px; padding: 10px 12px; background: #f9fafb; border-radius: 8px; }
  .strength-label { font-weight: 600; color: #374151; }
  .strength-bar-track { flex: 1; height: 10px; background: #e5e7eb; border-radius: 5px; overflow: hidden; }
  .strength-bar-fill { height: 100%; border-radius: 5px; transition: width 0.3s; }
  .strength-bar-fill.upgrade-critical { background: #7f1d1d; }
  .strength-bar-fill.upgrade-strong { background: #dc2626; }
  .strength-bar-fill.upgrade-moderate { background: #f59e0b; }
  .strength-bar-fill.upgrade-weak { background: #9ca3af; }
  .strength-bar-fill.downgrade-critical { background: #14532d; }
  .strength-bar-fill.downgrade-strong { background: #16a34a; }
  .strength-bar-fill.downgrade-moderate { background: #10b981; }
  .strength-bar-fill.downgrade-weak { background: #9ca3af; }
  .strength-num { font-weight: 700; font-size: 14px; min-width: 32px; text-align: right; }
  .strength-tier { font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; }

  .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 24px; }
  .feature-item { font-size: 13px; padding: 3px 0; display: flex; align-items: center; gap: 6px; }
  .feature-icon { font-size: 14px; width: 18px; text-align: center; }
  .feature-icon.on { color: #16a34a; }
  .feature-icon.off { color: #d1d5db; }

  .header-stats .user-badge { display: none; align-items: center; gap: 8px; font-size: 13px; color: #374151; background: #f3f4f6; border: 1px solid #e5e7eb; padding: 4px 10px; border-radius: 999px; }
  .header-stats .user-badge.visible { display: inline-flex; }
  .user-badge .user-dot { width: 7px; height: 7px; border-radius: 50%; background: #16a34a; }
  .user-badge .user-name { font-weight: 500; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>

<header>
  <h1>Cloudflare Domain Plan Analyzer</h1>
  <div class="header-stats">
    <span id="stat-total"></span>
    <span id="stat-enterprise"></span>
    <span id="stat-savings"></span>
    <span class="user-badge" id="user-badge" title="Authenticated user">
      <span class="user-dot"></span>
      <span class="user-name" id="user-name"></span>
    </span>
  </div>
</header>

<div class="toolbar" id="toolbar" style="display:none;">
  <input type="text" id="search" placeholder="Search domains...">
  <label>Sort by:
    <select id="sort">
      <option value="name">Name</option>
      <option value="requests">Requests</option>
      <option value="bandwidth">Bandwidth</option>
      <option value="strength">Recommendation strength</option>
      <option value="security">Security strength</option>
    </select>
  </label>
  <label>Min strength:
    <select id="min-strength">
      <option value="0">All</option>
      <option value="40">Moderate+</option>
      <option value="65">Strong+</option>
      <option value="85">Critical only</option>
      <option value="actionable">Any actionable</option>
    </select>
  </label>
  <span id="data-timestamp" style="font-size:12px; color:#888; margin-left:auto;"></span>
  <button id="btn-export-all">Export All</button>
  <span class="split-button" id="backup-split">
    <button id="btn-backup" class="split-main">Backup Zones to Azure</button>
    <button id="btn-backup-toggle" class="split-toggle" aria-haspopup="menu" aria-expanded="false" title="More backup options">&#x25BE;</button>
    <div class="split-menu hidden" id="backup-menu" role="menu">
      <button type="button" id="menu-backup-now" role="menuitem">Back up now</button>
      <button type="button" id="menu-backup-last" role="menuitem">Last Backup Details</button>
    </div>
  </span>
  <button id="btn-refresh" class="primary">Refresh Data</button>
  <button id="btn-reset">Reset Changes</button>
</div>

<div id="loading">
  <h2>Loading domain data...</h2>
  <div class="bar-container"><div class="bar" id="progress-bar"></div></div>
  <div class="status" id="progress-status">Connecting...</div>
</div>

<div class="columns hidden" id="columns">
  <div class="plan-column" data-plan="free">
    <div class="plan-column-header">Free <span class="count" data-count></span></div>
    <div class="plan-column-body" data-body></div>
  </div>
  <div class="plan-column" data-plan="pro">
    <div class="plan-column-header">Pro — $20/mo <span class="count" data-count></span></div>
    <div class="plan-column-body" data-body></div>
  </div>
  <div class="plan-column" data-plan="business">
    <div class="plan-column-header">Business — $200/mo <span class="count" data-count></span></div>
    <div class="plan-column-body" data-body></div>
  </div>
  <div class="plan-column" data-plan="enterprise">
    <div class="plan-column-header">Enterprise <span class="count" data-count></span></div>
    <div class="plan-column-body" data-body></div>
  </div>
</div>

<div id="pending">
  <h3>
    Pending Changes
    <button id="btn-export-changes" style="font-size:13px; padding:3px 10px; border:1px solid #d0d0d0; border-radius:5px; background:#fff; cursor:pointer;">Export Changes</button>
    <button id="btn-clear-pending" style="font-size:13px; padding:3px 10px; border:1px solid #d0d0d0; border-radius:5px; background:#fff; cursor:pointer;">Clear All</button>
  </h3>
  <div class="change-list" id="change-list"></div>
</div>

<div id="detail-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" id="modal-close-btn">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="backup-modal" class="modal-overlay hidden">
  <div class="modal" style="width: 560px;">
    <div class="modal-header">
      <h2>Backup Zones to Azure</h2>
      <button class="modal-close" id="backup-close-btn">&times;</button>
    </div>
    <div class="modal-body">
      <div id="backup-status" style="font-size: 14px; color: #555; margin-bottom: 12px;">Starting backup...</div>
      <div class="bar-container" style="width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin-bottom: 12px;">
        <div id="backup-bar" style="height: 100%; background: #2563eb; border-radius: 4px; transition: width 0.2s; width: 0%;"></div>
      </div>
      <div id="backup-counts" style="font-size: 13px; color: #666; margin-bottom: 12px;"></div>
      <div id="backup-log" style="font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 12px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px 10px; max-height: 280px; overflow-y: auto;"></div>
      <div id="backup-summary" style="margin-top: 14px; font-size: 14px;"></div>
    </div>
  </div>
</div>

<div id="last-backup-modal" class="modal-overlay hidden">
  <div class="modal" style="width: 520px;">
    <div class="modal-header">
      <h2>Last Backup Details</h2>
      <button class="modal-close" id="last-backup-close-btn">&times;</button>
    </div>
    <div class="modal-body">
      <div id="last-backup-content" style="font-size: 14px;">Loading...</div>
      <div style="margin-top: 14px; display: flex; gap: 8px; align-items: center;">
        <button type="button" id="btn-copy-last-backup" style="padding: 6px 14px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 13px; background: #fff; cursor: pointer;">Copy to Clipboard</button>
        <span id="copy-status" style="font-size: 12px; color: #16a34a;"></span>
      </div>
    </div>
  </div>
</div>

<script>
const PLAN_PRICES = { free: 0, pro: 20, business: 200, enterprise: 0 };
let allResults = [];
let pendingChanges = {}; // domain -> { from, to }
let enterpriseSlots = 0;

// --- Formatting ---
function fmtBytes(b) {
  if (b === 0) return "0 B";
  const u = ["B","KB","MB","GB","TB"];
  const i = Math.floor(Math.log(b) / Math.log(1024));
  return (b / Math.pow(1024, i)).toFixed(1) + " " + u[i];
}
function fmtNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + "B";
  if (n >= 1e6) return (n/1e6).toFixed(1) + "M";
  if (n >= 1e3) return (n/1e3).toFixed(1) + "K";
  return String(n);
}

// --- Timestamp display ---
function showTimestamp(isoString) {
  const el = document.getElementById("data-timestamp");
  if (!isoString) { el.textContent = ""; return; }
  const dt = new Date(isoString);
  const now = new Date();
  const diffMs = now - dt;
  const diffMins = Math.floor(diffMs / 60000);
  const diffHrs = Math.floor(diffMins / 60);

  let ago;
  if (diffMins < 1) ago = "just now";
  else if (diffMins < 60) ago = `${diffMins}m ago`;
  else if (diffHrs < 24) ago = `${diffHrs}h ago`;
  else ago = `${Math.floor(diffHrs / 24)}d ago`;

  el.textContent = `Data from ${dt.toLocaleDateString()} ${dt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} (${ago})`;
}

// --- Data loading ---
function showResults(d) {
  allResults = d.results;
  enterpriseSlots = d.enterpriseSlots || 0;
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("columns").classList.remove("hidden");
  document.getElementById("toolbar").style.display = "flex";
  showTimestamp(d.timestamp);
  renderAll();
}

// Try loading cached data first; if none, do a full refresh
async function loadData() {
  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("columns").classList.add("hidden");
  document.getElementById("toolbar").style.display = "none";
  document.getElementById("progress-status").textContent = "Checking for cached data...";
  pendingChanges = {};
  renderPending();

  try {
    const resp = await fetch("/api/cached");
    const cached = await resp.json();
    if (cached.results) {
      showResults(cached);
      return;
    }
  } catch { /* no cache, fall through to full refresh */ }

  fullRefresh();
}

function fullRefresh() {
  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("columns").classList.add("hidden");
  document.getElementById("toolbar").style.display = "none";
  pendingChanges = {};
  renderPending();

  const es = new EventSource("/api/analyze");

  es.addEventListener("progress", (e) => {
    const d = JSON.parse(e.data);
    const bar = document.getElementById("progress-bar");
    const status = document.getElementById("progress-status");
    if (d.total && d.current) {
      bar.style.width = Math.round((d.current / d.total) * 100) + "%";
      status.textContent = `[${d.current}/${d.total}] ${d.domain || ""}`;
    } else {
      status.textContent = d.message || "";
    }
  });

  es.addEventListener("done", (e) => {
    es.close();
    const d = JSON.parse(e.data);
    showResults(d);
  });

  es.addEventListener("error", (e) => {
    es.close();
    document.getElementById("progress-status").textContent = "Error loading data. Check server logs.";
  });
}

// --- Rendering ---
function getEffectivePlan(r) {
  return pendingChanges[r.domain]?.to || r.currentPlan;
}

function renderAll() {
  const search = document.getElementById("search").value.toLowerCase();
  const sortBy = document.getElementById("sort").value;
  const minStrength = document.getElementById("min-strength").value;

  // Min-strength filter applies to whichever score the user is sorting by.
  // Default: plan-recommendation score. When sorting by "security", the filter
  // applies to the security score instead.
  const scoreField = sortBy === "security" ? "securityScore" : "score";

  const filtered = allResults.filter(r => {
    if (search && !r.domain.toLowerCase().includes(search)) return false;
    if (minStrength === "actionable") {
      // For plan-score: any non-ok/non-error status is actionable.
      // For security-score: any non-zero security score is actionable.
      if (scoreField === "securityScore") {
        if (!(r.securityScore > 0)) return false;
      } else {
        if (r.status === "ok" || r.status === "error") return false;
      }
    } else {
      const min = parseInt(minStrength, 10) || 0;
      if (min > 0 && (r[scoreField] || 0) < min) return false;
    }
    return true;
  });

  const byPlan = { free: [], pro: [], business: [], enterprise: [] };
  for (const r of filtered) {
    const plan = getEffectivePlan(r);
    if (byPlan[plan]) byPlan[plan].push(r);
    else byPlan.free.push(r); // fallback
  }

  // Sort
  const sortFn = sortBy === "requests" ? (a,b) => b.monthlyRequests - a.monthlyRequests
    : sortBy === "bandwidth" ? (a,b) => b.monthlyBandwidth - a.monthlyBandwidth
    : sortBy === "strength" ? (a,b) => (b.score || 0) - (a.score || 0) || a.domain.localeCompare(b.domain)
    : sortBy === "security" ? (a,b) => (b.securityScore || 0) - (a.securityScore || 0) || a.domain.localeCompare(b.domain)
    : (a,b) => a.domain.localeCompare(b.domain);

  for (const plan of Object.keys(byPlan)) {
    byPlan[plan].sort(sortFn);
    const col = document.querySelector(`.plan-column[data-plan="${plan}"]`);
    col.querySelector("[data-count]").textContent = `(${byPlan[plan].length})`;
    const body = col.querySelector("[data-body]");
    body.innerHTML = "";
    for (const r of byPlan[plan]) {
      body.appendChild(createCard(r));
    }
  }

  updateStats();
}

function createCard(r) {
  const card = document.createElement("div");
  card.className = "domain-card";
  card.draggable = true;
  card.dataset.domain = r.domain;

  const moved = !!pendingChanges[r.domain];
  let badgeClass = "badge-" + r.status;
  let badgeText = r.status === "ok" ? "OK" : r.status === "downgrade" ? "DOWNGRADE" : r.status === "upgrade" ? "UPGRADE" : "ERROR";
  if (moved) { badgeClass = "badge-moved"; badgeText = "MOVED"; }

  let recommend = "";
  if (!moved && r.recommendedPlan !== r.currentPlan && r.status !== "error") {
    recommend = `<div class="recommend">Recommended: ${capitalize(r.recommendedPlan)}</div>`;
  }

  let scoreChip = "";
  if (!moved && typeof r.score === "number" && r.score > 0 && r.scoreLabel) {
    const chipCls = r.status === "downgrade" && r.scoreLabel !== "weak"
      ? `downgrade-${r.scoreLabel}`
      : r.scoreLabel;
    scoreChip = `<span class="score-chip ${chipCls}" title="Plan recommendation strength: ${r.score}/100">${r.scoreLabel.toUpperCase()} ${r.score}</span>`;
  }

  let secChip = "";
  if (typeof r.securityScore === "number" && r.securityScore > 0 && r.securityScoreLabel) {
    const recCount = (r.securityRecommendations || []).length;
    secChip = `<span class="sec-chip ${r.securityScoreLabel}" title="Security &amp; optimization: ${recCount} recommendation${recCount === 1 ? "" : "s"} (${r.securityScore}/100)">SEC ${r.securityScore}</span>`;
  }

  card.innerHTML = `
    <div class="domain-name">${escHtml(r.domain)}<span class="domain-badge ${badgeClass}">${badgeText}</span>${scoreChip}${secChip}</div>
    <div class="domain-stats">
      <span>${fmtNum(r.monthlyRequests)} req/mo</span>
      <span>${fmtBytes(r.monthlyBandwidth)}/mo</span>
    </div>
    ${recommend}
  `;

  card.addEventListener("dragstart", (e) => {
    e.dataTransfer.setData("text/plain", r.domain);
    card.classList.add("dragging");
  });
  card.addEventListener("dragend", () => card.classList.remove("dragging"));
  card.addEventListener("click", (e) => {
    // Don't open modal if user was dragging
    if (card.classList.contains("dragging")) return;
    showDetail(r);
  });

  return card;
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function escHtml(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// Render an Azure Portal link for a backup summary, if the server provided one.
// portalUrl is computed server-side; if null (no AZURE_STORAGE_CONNECTION_STRING),
// we render nothing. The link opens in a new tab.
function renderPortalLink(summary) {
  if (!summary || !summary.portalUrl) return "";
  return `<div style="margin-top: 8px; font-size: 13px;">
    <a href="${escHtml(summary.portalUrl)}" target="_blank" rel="noopener noreferrer"
       style="color: #2563eb; text-decoration: none; font-weight: 500;">
      View in Azure Portal &rarr;
    </a>
  </div>`;
}

// --- Drag & Drop ---
document.querySelectorAll(".plan-column").forEach(col => {
  col.addEventListener("dragover", (e) => { e.preventDefault(); col.classList.add("drag-over"); });
  col.addEventListener("dragleave", () => col.classList.remove("drag-over"));
  col.addEventListener("drop", (e) => {
    e.preventDefault();
    col.classList.remove("drag-over");
    const domain = e.dataTransfer.getData("text/plain");
    const targetPlan = col.dataset.plan;
    const r = allResults.find(x => x.domain === domain);
    if (!r) return;

    if (targetPlan === r.currentPlan) {
      // Moved back to original — remove pending change
      delete pendingChanges[domain];
    } else {
      pendingChanges[domain] = { from: r.currentPlan, to: targetPlan };
    }
    renderAll();
    renderPending();
  });
});

// --- Pending Changes ---
function renderPending() {
  const panel = document.getElementById("pending");
  const list = document.getElementById("change-list");
  const entries = Object.entries(pendingChanges);

  if (entries.length === 0) {
    panel.classList.remove("has-changes");
    return;
  }
  panel.classList.add("has-changes");

  list.innerHTML = "";
  for (const [domain, change] of entries) {
    const item = document.createElement("span");
    item.className = "change-item";
    item.innerHTML = `${escHtml(domain)}: ${capitalize(change.from)} <span class="arrow">&rarr;</span> ${capitalize(change.to)} <button data-domain="${escHtml(domain)}" title="Undo">&times;</button>`;
    item.querySelector("button").addEventListener("click", () => {
      delete pendingChanges[domain];
      renderAll();
      renderPending();
    });
    list.appendChild(item);
  }
}

function updateStats() {
  const total = allResults.length;
  const entCount = allResults.filter(r => getEffectivePlan(r) === "enterprise").length;

  // Calculate savings from pending changes
  let savingsDelta = 0;
  for (const [domain, change] of Object.entries(pendingChanges)) {
    const oldPrice = PLAN_PRICES[change.from] || 0;
    const newPrice = PLAN_PRICES[change.to] || 0;
    savingsDelta += oldPrice - newPrice;
  }

  document.getElementById("stat-total").textContent = `${total} domains`;
  document.getElementById("stat-enterprise").textContent = `Enterprise: ${entCount}/${enterpriseSlots} slots`;
  document.getElementById("stat-savings").textContent = savingsDelta > 0
    ? `Pending savings: $${savingsDelta}/mo`
    : savingsDelta < 0
      ? `Pending cost increase: +$${Math.abs(savingsDelta)}/mo`
      : "";
}

// --- CSV Export ---
function csvEscape(val) {
  const s = String(val ?? "");
  if (s.includes(",") || s.includes('"') || s.includes("\n")) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function downloadCsv(filename, headers, rows) {
  const lines = [headers.map(csvEscape).join(",")];
  for (const row of rows) {
    lines.push(row.map(csvEscape).join(","));
  }
  const blob = new Blob([lines.join("\n")], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function exportAll() {

    "Monthly Requests", "Monthly Bandwidth",
    "Cache Hit Ratio", "Current Price", "Recommended Price", "Monthly Savings",

  ];
  const rows = allResults.map(r => [

    r.monthlyRequests, fmtBytes(r.monthlyBandwidth),
    (r.cacheRatio * 100).toFixed(1) + "%",
    "$" + (r.currentPrice ?? 0), "$" + (r.recommendedPrice ?? 0),
    "$" + (r.monthlySavings ?? 0),
    (r.trafficReasons || []).join("; "),
    (r.featureReasons || []).join("; "),
    r.features?.waf ? "Yes" : "No",
    r.features?.firewallRules ?? 0,
    r.features?.customSSL ?? 0,
    r.features?.rateLimits ?? 0,
    r.features?.pageRules ?? 0,
    r.features?.workersRoutes ?? 0,
    r.features?.polish ?? "off",
    r.features?.mirage ? "Yes" : "No",
    r.features?.underAttack ? "Yes" : "No",
  ]);

  const date = new Date().toISOString().split("T")[0];
  downloadCsv(`cloudflare-analysis-${date}.csv`, headers, rows);
}

function exportChanges() {
  const entries = Object.entries(pendingChanges);
  if (entries.length === 0) return;

  const headers = [
    "Domain", "Current Plan", "Proposed Plan",
    "Current Price", "Proposed Price", "Monthly Savings",
    "Strength Score", "Strength Label",
    "Reasoning"
  ];
  const rows = entries.map(([domain, change]) => {
    const r = allResults.find(x => x.domain === domain);
    const fromPrice = PLAN_PRICES[change.from] || 0;
    const toPrice = PLAN_PRICES[change.to] || 0;
    const reasons = [...(r?.trafficReasons || []), ...(r?.featureReasons || [])];
    return [
      domain, capitalize(change.from), capitalize(change.to),
      "$" + fromPrice, "$" + toPrice, "$" + (fromPrice - toPrice),
      r?.score ?? 0, r?.scoreLabel || "",
      reasons.join("; "),
    ];
  });

  const date = new Date().toISOString().split("T")[0];
  downloadCsv(`cloudflare-changes-${date}.csv`, headers, rows);
}

// --- Backup Modal ---
let backupEventSource = null;

function openBackupModal() {
  document.getElementById("backup-modal").classList.remove("hidden");
  document.getElementById("backup-status").textContent = "Connecting to Azure...";
  document.getElementById("backup-bar").style.width = "0%";
  document.getElementById("backup-counts").textContent = "";
  document.getElementById("backup-log").innerHTML = "";
  document.getElementById("backup-summary").innerHTML = "";
  startBackup();
}

function closeBackupModal() {
  if (backupEventSource) {
    backupEventSource.close();
    backupEventSource = null;
  }
  document.getElementById("backup-modal").classList.add("hidden");
}

function appendBackupLog(line, color) {
  const log = document.getElementById("backup-log");
  const div = document.createElement("div");
  if (color) div.style.color = color;
  div.textContent = line;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function startBackup() {
  let succeeded = 0;
  let failed = 0;
  let total = 0;

  backupEventSource = new EventSource("/api/backup");

  backupEventSource.addEventListener("progress", (e) => {
    const evt = JSON.parse(e.data);
    if (evt.phase === "start") {
      total = evt.total;
      document.getElementById("backup-status").textContent =
        `Backing up ${total} zone(s) — run ${evt.runId}`;
      appendBackupLog(`Run started: ${evt.runId}`);
    } else if (evt.phase === "zone") {
      if (evt.status === "ok") {
        succeeded++;
        appendBackupLog(`[${evt.current}/${evt.total}] ${evt.domain} — ok`);
      } else {
        failed++;
        appendBackupLog(`[${evt.current}/${evt.total}] ${evt.domain} — FAILED: ${evt.error}`, "#b91c1c");
      }
      const pct = Math.round((evt.current / evt.total) * 100);
      document.getElementById("backup-bar").style.width = pct + "%";
      document.getElementById("backup-counts").textContent =
        `${evt.current}/${evt.total} done — ${succeeded} ok, ${failed} failed`;
    } else if (evt.phase === "manifest") {
      document.getElementById("backup-status").textContent = "Uploading manifest...";
      appendBackupLog("Uploading manifest.json");
    }
  });

  backupEventSource.addEventListener("done", (e) => {
    const summary = JSON.parse(e.data);
    backupEventSource.close();
    backupEventSource = null;

    document.getElementById("backup-status").textContent = "Backup complete";
    document.getElementById("backup-bar").style.width = "100%";
    document.getElementById("backup-bar").style.background = summary.failed > 0 ? "#f59e0b" : "#10b981";

    const summaryEl = document.getElementById("backup-summary");
    summaryEl.innerHTML = `
      <div style="padding: 10px 12px; background: ${summary.failed > 0 ? "#fef3c7" : "#d1fae5"}; border-radius: 6px;">
        <strong>Run ID:</strong> ${escHtml(summary.runId || "")}<br>
        <strong>Container:</strong> ${escHtml(summary.container || "")}<br>
        <strong>Result:</strong> ${summary.succeeded || 0} succeeded, ${summary.failed || 0} failed (of ${summary.total || 0})
        ${renderPortalLink(summary)}
      </div>
    `;
  });

  backupEventSource.addEventListener("error", (e) => {
    let msg = "Connection lost.";
    try {
      if (e.data) msg = JSON.parse(e.data).message || msg;
    } catch {}
    document.getElementById("backup-status").textContent = "Backup failed";
    appendBackupLog(`ERROR: ${msg}`, "#b91c1c");
    if (backupEventSource) {
      backupEventSource.close();
      backupEventSource = null;
    }
  });
}

// --- Last Backup Details Modal ---
let currentLastBackup = null;

function formatLastBackupText(s) {
  const lines = [
    `Run ID:    ${s.runId || ""}`,
    `Container: ${s.container || ""}`,
    `Timestamp: ${s.timestamp || ""}`,
    `Result:    ${s.succeeded || 0} succeeded, ${s.failed || 0} failed (of ${s.total || 0})`,
  ];
  if (Array.isArray(s.errors) && s.errors.length) {
    lines.push("", "Errors:");
    for (const err of s.errors) {
      lines.push(`  - ${err.domain}: ${err.error}`);
    }
  }
  return lines.join("\n");
}

function renderLastBackupContent(s) {
  if (!s) {
    return `<div style="padding: 12px; background: #f9fafb; border-radius: 6px; color: #666;">No backup has been recorded yet. Run a backup first.</div>`;
  }
  const bg = (s.failed || 0) > 0 ? "#fef3c7" : "#d1fae5";
  let html = `
    <div style="padding: 10px 12px; background: ${bg}; border-radius: 6px;">
      <strong>Run ID:</strong> ${escHtml(s.runId || "")}<br>
      <strong>Container:</strong> ${escHtml(s.container || "")}<br>
      <strong>Timestamp:</strong> ${escHtml(s.timestamp || "")}<br>
      <strong>Result:</strong> ${s.succeeded || 0} succeeded, ${s.failed || 0} failed (of ${s.total || 0})
      ${renderPortalLink(s)}
    </div>
  `;
  if (Array.isArray(s.errors) && s.errors.length) {
    html += `<div style="margin-top: 12px; font-size: 13px;"><strong>Errors:</strong><ul style="margin: 6px 0 0 18px; color: #991b1b;">`;
    for (const err of s.errors) {
      html += `<li>${escHtml(err.domain)}: ${escHtml(err.error)}</li>`;
    }
    html += `</ul></div>`;
  }
  return html;
}

async function openLastBackupModal() {
  const modal = document.getElementById("last-backup-modal");
  const content = document.getElementById("last-backup-content");
  document.getElementById("copy-status").textContent = "";
  content.innerHTML = "Loading...";
  modal.classList.remove("hidden");

  try {
    const res = await fetch("/api/last-backup");
    const data = await res.json();
    currentLastBackup = data.summary || null;
    content.innerHTML = renderLastBackupContent(currentLastBackup);
    document.getElementById("btn-copy-last-backup").disabled = !currentLastBackup;
  } catch (err) {
    currentLastBackup = null;
    content.innerHTML = `<div style="color: #b91c1c;">Failed to load: ${escHtml(err.message)}</div>`;
  }
}

function closeLastBackupModal() {
  document.getElementById("last-backup-modal").classList.add("hidden");
}

document.getElementById("last-backup-close-btn").addEventListener("click", closeLastBackupModal);
document.getElementById("last-backup-modal").addEventListener("click", (e) => {
  if (e.target.id === "last-backup-modal") closeLastBackupModal();
});

document.getElementById("btn-copy-last-backup").addEventListener("click", async () => {
  if (!currentLastBackup) return;
  const text = formatLastBackupText(currentLastBackup);
  const status = document.getElementById("copy-status");
  try {
    await navigator.clipboard.writeText(text);
    status.textContent = "Copied!";
    setTimeout(() => { status.textContent = ""; }, 2000);
  } catch {
    status.textContent = "Copy failed — your browser may block clipboard access.";
    status.style.color = "#b91c1c";
  }
});

// --- Detail Modal ---
function headroomColor(pct) {
  if (pct > 85) return "red";
  if (pct > 60) return "yellow";
  return "green";
}

const PROFILE_LABELS = {
  "dev-staging": "Dev / staging",
  "parked": "Parked",
  "email-only": "Email-only",
  "static-cdn": "Static / CDN-friendly",
  "dynamic-app": "Dynamic application",
  "api": "API endpoint",
  "high-traffic-prod": "High-traffic production",
  "low-traffic-marketing": "Low-traffic marketing",
};

function renderSecuritySection(r) {
  const recs = r.securityRecommendations || [];
  const profileLabel = PROFILE_LABELS[r.profile] || r.profile || "Unclassified";

  let html = `<div class="detail-section"><h3>Security &amp; Optimization</h3>`;
  html += `<div style="font-size:12px; color:#666; margin-bottom:8px;">Site profile: <strong>${escHtml(profileLabel)}</strong>`;
  if (typeof r.securityScore === "number" && r.securityScore > 0) {
    html += ` &middot; Security score: <strong>${r.securityScore}/100 (${escHtml(r.securityScoreLabel)})</strong>`;
  }
  html += `</div>`;

  if (!recs.length) {
    html += `<ul><li>No actionable items detected for this domain.</li></ul></div>`;
    return html;
  }

  // Group by category preserving severity order (recs are pre-sorted)
  const byCategory = { security: [], performance: [] };
  for (const rec of recs) {
    if (byCategory[rec.category]) byCategory[rec.category].push(rec);
  }

  for (const cat of ["security", "performance"]) {
    if (!byCategory[cat].length) continue;
    html += `<div style="margin-top:8px;"><div style="font-size:12px; font-weight:600; color:#555; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.04em;">${cat}</div>`;
    for (const rec of byCategory[cat]) {
      html += `<div style="padding:8px 10px; margin-bottom:6px; border:1px solid #e5e7eb; border-radius:6px; background:#fafafa;">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
          <span class="sec-chip ${escHtml(rec.severity)}" style="margin-left:0;">${escHtml(rec.severity.toUpperCase())}</span>
          <span style="font-weight:600; font-size:13px;">${escHtml(rec.title)}</span>
        </div>
        <div style="font-size:12px; color:#555; line-height:1.4; margin-bottom:4px;">${escHtml(rec.why)}</div>
        <div style="font-size:11px; color:#888; font-family: ui-monospace, SFMono-Regular, Consolas, monospace;">${escHtml(rec.action)}</div>
      </div>`;
    }
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function showDetail(r) {
  const modal = document.getElementById("detail-modal");
  document.getElementById("modal-title").textContent = r.domain;

  const statusLabel = r.status === "ok" ? "No change needed"
    : r.status === "downgrade" ? "Downgrade recommended"
    : r.status === "upgrade" ? "Upgrade recommended" : "Error";

  let html = "";

  // Plan row
  html += `<div class="detail-plan-row">
    <span class="detail-plan-badge ${r.currentPlan}">${capitalize(r.currentPlan)}</span>`;
  if (r.recommendedPlan !== r.currentPlan && r.status !== "error") {
    html += `<span class="detail-arrow">&rarr;</span>
      <span class="detail-plan-badge ${r.recommendedPlan}">${capitalize(r.recommendedPlan)}</span>`;
  }
  html += `<span class="detail-status ${r.status}">${statusLabel}</span>`;
  if (r.monthlySavings > 0) {
    html += `<span style="font-size:13px; color:#166534; font-weight:600;">Save $${r.monthlySavings}/mo</span>`;
  }
  html += `</div>`;

  // Analysis period
  html += `<div style="font-size:12px; color:#888; margin-bottom:16px;">Based on ${r.analysisDays || 30}-day analysis period</div>`;

  // Recommendation strength
  if (typeof r.score === "number" && r.score > 0 && r.scoreLabel) {
    const fillCls = `${r.status}-${r.scoreLabel}`;
    html += `<div class="strength-row">
      <span class="strength-label">Strength</span>
      <span class="strength-tier">${r.scoreLabel}</span>
      <div class="strength-bar-track">
        <div class="strength-bar-fill ${fillCls}" style="width: ${r.score}%"></div>
      </div>
      <span class="strength-num">${r.score}</span>
    </div>`;
  }

  // Traffic Analysis
  html += `<div class="detail-section"><h3>Traffic Analysis</h3>`;
  if (r.trafficReasons && r.trafficReasons.length) {
    html += `<ul>${r.trafficReasons.map(s => `<li>${escHtml(s)}</li>`).join("")}</ul>`;
  } else {
    html += `<ul><li>No traffic data available</li></ul>`;
  }
  html += `</div>`;

  // Feature Requirements
  html += `<div class="detail-section"><h3>Feature Requirements</h3>`;
  if (r.featureReasons && r.featureReasons.length) {
    html += `<ul>${r.featureReasons.map(s => `<li>${escHtml(s)}</li>`).join("")}</ul>`;
  } else {
    html += `<ul><li>No feature-based upgrade signals detected</li></ul>`;
  }
  html += `</div>`;

  // Security & Optimization
  html += renderSecuritySection(r);

  // Headroom
  if (r.headroom) {
    html += `<div class="detail-section"><h3>Tier Headroom</h3>`;

    const dims = [
      { key: "requests", label: "Requests", fmt: fmtNum, limitFmt: fmtNum },
      { key: "bandwidth", label: "Bandwidth", fmt: fmtBytes, limitFmt: fmtBytes },
      { key: "pageRules", label: "Page Rules", fmt: String, limitFmt: String },
    ];

    for (const d of dims) {
      const h = r.headroom[d.key];
      if (!h || h.limit === Infinity) continue;
      const pct = Math.min(h.percent, 100);
      const color = headroomColor(h.percent);
      html += `<div class="headroom-row">
        <span class="headroom-label">${d.label}</span>
        <div class="headroom-bar-track">
          <div class="headroom-bar-fill ${color}" style="width: ${pct}%"></div>
        </div>
        <span class="headroom-pct ${color}">${h.percent}%</span>
        <span class="headroom-value">${d.fmt(h.current)} / ${d.limitFmt(h.limit)}</span>
      </div>`;
    }
    html += `</div>`;
  }

  // Feature Checklist
  if (r.features) {
    html += `<div class="detail-section"><h3>Feature Inventory</h3><div class="feature-grid">`;

    const featureItems = [
      { label: "WAF", val: r.features.waf, display: r.features.waf ? "Enabled" : "Off" },
      { label: "Firewall Rules", val: r.features.firewallRules > 0, display: String(r.features.firewallRules) },
      { label: "Custom SSL", val: r.features.customSSL > 0, display: String(r.features.customSSL) },
      { label: "Rate Limits", val: r.features.rateLimits > 0, display: String(r.features.rateLimits) },
      { label: "Page Rules", val: r.features.pageRules > 0, display: String(r.features.pageRules) },
      { label: "Workers Routes", val: r.features.workersRoutes > 0, display: String(r.features.workersRoutes) },
      { label: "Polish", val: r.features.polish !== "off", display: r.features.polish },
      { label: "Mirage", val: r.features.mirage, display: r.features.mirage ? "Enabled" : "Off" },
      { label: "Under Attack", val: r.features.underAttack, display: r.features.underAttack ? "Active" : "Off" },
    ];

    for (const f of featureItems) {
      const icon = f.val ? "✓" : "—";
      const cls = f.val ? "on" : "off";
      html += `<div class="feature-item">
        <span class="feature-icon ${cls}">${icon}</span>
        <span>${f.label}: <strong>${f.display}</strong></span>
      </div>`;
    }
    html += `</div></div>`;
  }

  document.getElementById("modal-body").innerHTML = html;
  modal.classList.remove("hidden");
}

function closeModal() {
  document.getElementById("detail-modal").classList.add("hidden");
}

document.getElementById("modal-close-btn").addEventListener("click", closeModal);
document.getElementById("detail-modal").addEventListener("click", (e) => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});

// --- Authenticated user badge (App Service Easy Auth) ---
// Fetches /.auth/me — only populated when Easy Auth is enabled. Silently hides
// on failure so local dev (no auth) still works cleanly.
async function loadUserBadge() {
  try {
    const resp = await fetch("/.auth/me", { credentials: "include" });
    if (!resp.ok) return;
    const data = await resp.json();
    const principal = Array.isArray(data) ? data[0] : data;
    if (!principal) return;

    const claims = principal.user_claims || [];
    const findClaim = (typ) => claims.find((c) => c.typ === typ)?.val;
    const name =
      findClaim("name") ||
      findClaim("preferred_username") ||
      findClaim("http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name") ||
      principal.user_id ||
      "authenticated";

    document.getElementById("user-name").textContent = name;
    document.getElementById("user-badge").classList.add("visible");
  } catch { /* no auth — hide silently */ }
}

// --- Init ---
loadUserBadge();
loadData();
</script>
